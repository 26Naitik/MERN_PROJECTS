<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Table</title>
</head>
<body>

    <h2>Student Marks Table</h2>

    <table border="1">

        <!-- table heading -->
        <tr>
            <th>Name</th>
            <th>Batch</th>
            <th>Marks</th>
        </tr>

        <!-- row 1 -->
        <tr>
            <td>Naitik</td>
            <td>B.Tech CSE</td>
            <td>89</td>
        </tr>

        <!-- row 2 -->
        <tr>
            <td>Rahul</td>
            <td>BCA</td>
            <td>76</td>
        </tr>

        <!-- row 3 -->
        <tr>
            <td>Priya</td>
            <td>MCA</td>
            <td>92</td>
        </tr>

        <!-- total row -->
        <tr>
            <td colspan="2">Total Marks</td>
            <td>257</td>
        </tr>

    </table>

</body>
</html>
