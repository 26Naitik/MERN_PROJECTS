<!-- desighn a basic trafic light -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            width: 100px;
            background-color: black;
            padding:10px;
            margin: 50px auto 0;
        }
        .light{
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 10px auto;
        }
        .red{
            background-color: red;
        }
        .yellow{
            background-color: yellow;
        }
        .green{
            background-color: green;
        }
        .stand{
            width: 20px;
            height: 200px;
            background-color: black;
            margin: 0 auto;
        }
        .line{
            width: 200px;
            height: 18px;
            background-color: black;
            margin: auto ;
        }
    </style>

</head>
<body>
    <div class="box">
        <div class="light red"></div>
        <div class="light yellow"></div>
        <div class="light green"></div>
    </div>

    <div class="stand"></div>
    <div class="line"></div>
</body>
</html>
