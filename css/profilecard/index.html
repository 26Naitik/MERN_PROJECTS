<!DOCTYPE html>
<html lang="en">
<head>

    <title>Profile Card</title>
    <style>
        body{
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        .card h3{
            color: rgb(11, 11, 11);
        }
        .card{
            background-color:rgb(171, 122, 122);

            display:flex;
            flex-direction:column;

        }
        .card img{
            width: 100px;
            height: 100px;
            border-radius: 50%;
        }
        .card h2{
            margin: 10px 0 5px;
            color:#f0f0f0
        }
        .card p{
            color:black;
            margin-bottom: 15px;
        }
        .card button{
            padding: 10px 20px;background-color: blue;color: white;
            border: none;
    }
    </style>
</head>
<body>
    <div class="card">
        <h3>Profile Card</h3>
